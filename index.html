<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aaria Realty QR Generator</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
body{
    font-family:Arial,sans-serif;
    padding:20px;
    background:#f5f5f5;
}

.container{
    max-width:1200px;
    margin:auto;
}

.controls{
    background:white;
    padding:20px;
    border-radius:10px;
    margin-bottom:20px;
}

input{
    padding:10px;
    margin:5px;
    width:150px;
}

button{
    padding:10px 20px;
    cursor:pointer;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
    gap:20px;
}

.card{
    background:white;
    border-radius:10px;
    padding:15px;
    text-align:center;
    box-shadow:0 2px 8px rgba(0,0,0,.1);
}

.url{
    font-size:12px;
    word-break:break-all;
    margin-top:10px;
}

.download-btn{
    margin-top:10px;
    width:100%;
}
</style>
</head>
<body>

<div class="container">

<h2>Aaria Realty QR Generator</h2>

<div class="controls">
    <input id="start" type="number" value="1001" placeholder="Start Number">
    <input id="end" type="number" value="1010" placeholder="End Number">

    <button onclick="generateQRs()">
        Generate QR Codes
    </button>
</div>

<div id="qrContainer" class="grid"></div>

</div>

<script>

const BASE_URL = "https://aariarealty.com/q/";

function generateQRs(){

    const start = parseInt(document.getElementById("start").value);
    const end = parseInt(document.getElementById("end").value);

    const container = document.getElementById("qrContainer");

    container.innerHTML = "";

    for(let i=start;i<=end;i++){

        const url = BASE_URL + i;

        const card = document.createElement("div");
        card.className = "card";

        const qrDiv = document.createElement("div");

        const textDiv = document.createElement("div");
        textDiv.className = "url";
        textDiv.innerText = url;

        const btn = document.createElement("button");
        btn.className = "download-btn";
        btn.innerText = "Download";

        card.appendChild(qrDiv);
        card.appendChild(textDiv);
        card.appendChild(btn);

        container.appendChild(card);

        new QRCode(qrDiv,{
            text:url,
            width:180,
            height:180
        });

        btn.onclick = () => {

            const img = qrDiv.querySelector("img");

            const a = document.createElement("a");
            a.href = img.src;
            a.download = `QR_${i}.png`;
            a.click();
        };
    }
}

generateQRs();

</script>

</body>
</html>
