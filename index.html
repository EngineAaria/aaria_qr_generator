<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aaria Realty Bulk QR Generator</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcode/1.5.3/qrcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>

<style>
body{
    font-family:Arial,sans-serif;
    background:#f4f6f9;
    margin:0;
    padding:30px;
}

.container{
    max-width:900px;
    margin:auto;
}

.card{
    background:white;
    padding:25px;
    border-radius:12px;
    box-shadow:0 2px 12px rgba(0,0,0,.08);
}

h1{
    margin-top:0;
}

label{
    display:block;
    margin-top:15px;
    font-weight:bold;
}

input{
    width:100%;
    padding:10px;
    margin-top:5px;
    border:1px solid #ccc;
    border-radius:6px;
}

button{
    margin-top:20px;
    padding:12px 20px;
    border:none;
    border-radius:6px;
    cursor:pointer;
    font-size:16px;
}

.primary{
    background:#2563eb;
    color:white;
}

.progress{
    margin-top:20px;
    width:100%;
    height:25px;
    background:#ddd;
    border-radius:20px;
    overflow:hidden;
    display:none;
}

.progress-bar{
    height:100%;
    width:0%;
    background:#16a34a;
    transition:.2s;
}

.status{
    margin-top:10px;
    font-weight:bold;
}

.preview{
    margin-top:30px;
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
    gap:20px;
}

.preview-card{
    background:white;
    padding:10px;
    text-align:center;
    border-radius:10px;
}

.preview-card img{
    width:150px;
}
</style>
</head>
<body>

<div class="container">

<div class="card">

<h1>Aaria Realty Bulk QR Generator</h1>

<label>Base URL</label>
<input id="baseUrl"
value="https://aariarealty.com/q/" />

<label>Start Number</label>
<input id="startNumber"
type="number"
value="1001" />

<label>End Number</label>
<input id="endNumber"
type="number"
value="1010" />

<button class="primary" onclick="generateZip()">
Generate & Download ZIP
</button>

<div class="progress" id="progress">
<div class="progress-bar" id="progressBar"></div>
</div>

<div class="status" id="status"></div>

<div class="preview" id="preview"></div>

</div>

</div>

<script>

async function generateZip() {

    const baseUrl =
        document.getElementById("baseUrl").value.trim();

    const start =
        parseInt(document.getElementById("startNumber").value);

    const end =
        parseInt(document.getElementById("endNumber").value);

    if (start > end) {
        alert("Start number must be smaller than End number");
        return;
    }

    const total = end - start + 1;

    const progress =
        document.getElementById("progress");

    const progressBar =
        document.getElementById("progressBar");

    const status =
        document.getElementById("status");

    const preview =
        document.getElementById("preview");

    preview.innerHTML = "";

    progress.style.display = "block";

    const zip = new JSZip();

    for (let i = start; i <= end; i++) {

        const url = baseUrl + i;

        const qrDataUrl =
            await QRCode.toDataURL(url, {
                width: 1000,
                margin: 2
            });

        const base64 =
            qrDataUrl.split(",")[1];

        zip.file(
            `QR_${i}.png`,
            base64,
            { base64: true }
        );

        const current =
            i - start + 1;

        const percent =
            Math.round(
                (current / total) * 100
            );

        progressBar.style.width =
            percent + "%";

        status.innerHTML =
            `Generating ${current} of ${total}`;

        if (
            current <= 12
        ) {
            const card =
                document.createElement("div");

            card.className =
                "preview-card";

            card.innerHTML = `
                <img src="${qrDataUrl}">
                <div>${i}</div>
            `;

            preview.appendChild(card);
        }

        if (current % 20 === 0) {
            await new Promise(
                r => setTimeout(r, 1)
            );
        }
    }

    status.innerHTML =
        "Compressing ZIP...";

    const content =
        await zip.generateAsync({
            type: "blob"
        });

    saveAs(
        content,
        `Aaria_QR_${start}_to_${end}.zip`
    );

    status.innerHTML =
        `Done! Generated ${total} QR Codes`;

    progressBar.style.width = "100%";
}

</script>

</body>
</html>
