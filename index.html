<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aaria Realty Bulk QR Generator</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>

<style>
body{
    font-family:Arial,sans-serif;
    background:#f4f6f9;
    padding:30px;
}

.container{
    max-width:900px;
    margin:auto;
}

.card{
    background:#fff;
    padding:25px;
    border-radius:12px;
    box-shadow:0 2px 10px rgba(0,0,0,.1);
}

input{
    width:100%;
    padding:10px;
    margin-top:5px;
    margin-bottom:15px;
    border:1px solid #ccc;
    border-radius:6px;
}

button{
    background:#2563eb;
    color:white;
    border:none;
    padding:12px 20px;
    border-radius:6px;
    cursor:pointer;
}

button:hover{
    background:#1d4ed8;
}

.progress{
    margin-top:20px;
    width:100%;
    height:25px;
    background:#ddd;
    border-radius:20px;
    overflow:hidden;
}

.progress-bar{
    width:0%;
    height:100%;
    background:#22c55e;
}

.status{
    margin-top:10px;
    font-weight:bold;
}

.preview{
    margin-top:30px;
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
    gap:20px;
}

.preview-card{
    background:white;
    padding:10px;
    border-radius:10px;
    text-align:center;
    box-shadow:0 1px 5px rgba(0,0,0,.08);
}

.preview-card img{
    width:150px;
}
</style>
</head>

<body>

<div class="container">

<div class="card">

<h2>Aaria Realty Bulk QR Generator</h2>

<label>Base URL</label>
<input id="baseUrl"
value="https://aariarealty.com/q/">

<label>Start Number</label>
<input id="startNumber"
type="number"
value="1001">

<label>End Number</label>
<input id="endNumber"
type="number"
value="1010">

<button onclick="generateQRs()">
Generate ZIP
</button>

<div class="progress">
<div class="progress-bar" id="bar"></div>
</div>

<div class="status" id="status"></div>

<div class="preview" id="preview"></div>

</div>

</div>

<script>

function generateQRCodeDataURL(text){

    return new Promise((resolve)=>{

        const tempDiv = document.createElement("div");

        new QRCode(tempDiv,{
            text:text,
            width:400,
            height:400
        });

        setTimeout(()=>{

            const img = tempDiv.querySelector("img");

            if(img){
                resolve(img.src);
                return;
            }

            const canvas =
                tempDiv.querySelector("canvas");

            resolve(canvas.toDataURL());

        },100);
    });
}

async function generateQRs(){

    const start =
        parseInt(
            document.getElementById(
                "startNumber"
            ).value
        );

    const end =
        parseInt(
            document.getElementById(
                "endNumber"
            ).value
        );

    const baseUrl =
        document.getElementById(
            "baseUrl"
        ).value.trim();

    if(start > end){
        alert("Invalid range");
        return;
    }

    const total =
        end - start + 1;

    const zip =
        new JSZip();

    const preview =
        document.getElementById(
            "preview"
        );

    preview.innerHTML = "";

    const status =
        document.getElementById(
            "status"
        );

    const bar =
        document.getElementById(
            "bar"
        );

    for(
        let i=start;
        i<=end;
        i++
    ){

        const url =
            baseUrl + i;

        const dataURL =
            await generateQRCodeDataURL(url);

        const base64 =
            dataURL.split(",")[1];

        zip.file(
            `QR_${i}.png`,
            base64,
            {base64:true}
        );

        const current =
            i-start+1;

        const percent =
            Math.round(
                current/total*100
            );

        bar.style.width =
            percent + "%";

        status.innerHTML =
            `Generating ${current} of ${total}`;

        if(current <= 12){

            const card =
                document.createElement("div");

            card.className =
                "preview-card";

            card.innerHTML = `
                <img src="${dataURL}">
                <div>${url}</div>
            `;

            preview.appendChild(card);
        }

        if(current % 25 === 0){
            await new Promise(
                r=>setTimeout(r,1)
            );
        }
    }

    status.innerHTML =
        "Creating ZIP...";

    const content =
        await zip.generateAsync({
            type:"blob"
        });

    saveAs(
        content,
        `Aaria_QR_${start}_${end}.zip`
    );

    status.innerHTML =
        `Done! Generated ${total} QR Codes`;

    bar.style.width =
        "100%";
}

</script>

</body>
</html>
